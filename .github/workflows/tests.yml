name: Run Tests

on: push

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        solr_version: [8, 10]
        ruby_version: ['3.3', '3.4', '4.0']
    name: test-solr-${{ matrix.solr_version }}-ruby-${{ matrix.ruby_version }}
    runs-on: ubuntu-latest

    env:
      SOLR_USER: solr
      SOLR_PASSWORD: SolrRocks

    steps:
      - uses: actions/checkout@v6

      - name: Create .env file
        run: cat env.* > .env

      - name: Set version vars
        id: vars
        run: |
          if [ "${{ matrix.solr_version }}" = "8" ]; then
            echo "SOLR_PORT=6781" >> $GITHUB_OUTPUT
            echo "SOLR_SERVICE=solr" >> $GITHUB_OUTPUT
          else
            echo "SOLR_PORT=6783" >> $GITHUB_OUTPUT
            echo "SOLR_SERVICE=solr10" >> $GITHUB_OUTPUT
          fi

      - name: build image
        run: docker compose build ${{ steps.vars.outputs.SOLR_SERVICE }}

      - name: start container
        run: docker compose up -d ${{ steps.vars.outputs.SOLR_SERVICE }}

      - name: docker compose ps
        run: docker compose ps

      - name: wait for solr
        run: |
          URL="http://127.0.0.1:${{ steps.vars.outputs.SOLR_PORT }}/solr/admin/info/system"
          for i in $(seq 1 60); do
            if curl -sf -u solr:SolrRocks "$URL" > /dev/null 2>&1; then
              echo "Solr ready after ${i}s"
              exit 0
            fi
            sleep 5
          done
          echo "Solr did not become ready within 300s"
          exit 1

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: run tests
        run: bundle exec rspec
        env:
          SOLR_URL: http://localhost:${{ steps.vars.outputs.SOLR_PORT }}/
          GHA_TEST: "true"
