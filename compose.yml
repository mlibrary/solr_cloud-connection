services:
  app:
    build: 
      context: .
      target: development
    platform: linux/amd64
    volumes:
      - .:/app
      - gem_cache:/gems
    env_file:
      - .env
      - env.test
    command: "tail -f /dev/null"
    depends_on:
      solr:
        condition: service_healthy
      solr10:
        condition: service_healthy

  solr:
    build: spec/data/solr_docker/.
    ports:
      - "6781:8983"
    environment:
      - ZK_HOST=zoo:2181
    depends_on:
      - zoo
    command: solr-foreground
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u solr:SolrRocks http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zoo:
    image: zookeeper
    ports:
      - 6782:2181
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888;2181

  solr10:
    build: spec/data/solr10_docker/.
    ports:
      - "6783:8983"
    environment:
      - ZK_HOST=zoo10:2181
    depends_on:
      - zoo10
    command: solr-foreground
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u solr:SolrRocks http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zoo10:
    image: zookeeper
    ports:
      - 6784:2181
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888;2181
        
volumes:
  gem_cache:
